name: Lineage Price 每小时币价更新

on:
  schedule:
    - cron: '5 * * * *' # 每小时的第 5 分钟运行一次 (错开整点高峰)
  workflow_dispatch: # 支持手动点击运行

concurrency:
  group: price-task
  cancel-in-progress: true

jobs:
  update-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 初始化 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 3. 安装依赖并运行爬虫
        run: |
          cd Price
          npm install axios
          node fetch.js

      - name: 4. 提交并推送数据
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Ando-Bot-Price"
          
          # 仅添加 Price 目录下的 json 文件
          git add Price/*.json
          
          if git diff --cached --quiet; then
            echo "币价未发生变化，跳过提交。"
          else
            git commit -m "Price Update: $(date '+%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push origin main
          fi
